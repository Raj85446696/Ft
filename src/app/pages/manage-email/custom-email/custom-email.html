<div class="min-h-screen bg-[#f9fafb]">

  <div class="min-h-screen bg-[#f9fafb] p-[32px] pt-[96px] transition-all duration-300"
    [ngClass]="{'ml-[80px]': sidebarService.isCollapsed(), 'ml-[255px]': !sidebarService.isCollapsed()}">

    <div class="max-w-[860px] mx-auto space-y-8">

      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-4 border-b border-[#e5e7eb]">
        <div class="space-y-1">
          <h1 class="text-[32px] font-bold text-[#101828]">Compose Email</h1>
          <p class="text-[16px] text-[#4a5565]">Send a custom email via the notification system</p>
        </div>
        <div class="flex items-center gap-3">
          <button (click)="onSaveDraft()"
                  class="bg-white border border-[#d1d5dc] text-[#364153] h-[46px] px-6 rounded-[12px] text-[14px] font-bold hover:bg-gray-50 transition-all flex items-center gap-2 cursor-pointer">
            <span class="material-icons text-[18px]">drafts</span>
            Save as Draft
          </button>
          <button (click)="onSend()" [disabled]="isSending"
                  class="bg-[#155dfc] text-white h-[46px] px-8 rounded-[12px] flex items-center gap-2 text-[14px] font-bold shadow-lg shadow-blue-500/20 hover:bg-[#0047e0] transition-all disabled:opacity-60 cursor-pointer">
            <span class="material-icons text-[18px]">send</span>
            {{isSending ? 'Sending...' : 'Send Email'}}
          </button>
        </div>
      </div>

      <!-- Form -->
      <div class="bg-white rounded-[24px] border border-[#e5e7eb] shadow-sm p-8 space-y-6">

        <!-- To -->
        <div class="space-y-2">
          <label class="text-[14px] font-bold text-[#364153]">To <span class="text-red-500">*</span></label>
          <input type="email" [(ngModel)]="email.to" placeholder="recipient@example.com"
                 class="w-full h-[50px] px-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] focus:outline-none focus:border-[#155dfc]">
        </div>

        <!-- CC & BCC -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[14px] font-bold text-[#364153]">CC</label>
            <input type="email" [(ngModel)]="email.cc" placeholder="cc@example.com"
                   class="w-full h-[50px] px-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] focus:outline-none focus:border-[#155dfc]">
          </div>
          <div class="space-y-2">
            <label class="text-[14px] font-bold text-[#364153]">BCC</label>
            <input type="email" [(ngModel)]="email.bcc" placeholder="bcc@example.com"
                   class="w-full h-[50px] px-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] focus:outline-none focus:border-[#155dfc]">
          </div>
        </div>

        <!-- Subject -->
        <div class="space-y-2">
          <label class="text-[14px] font-bold text-[#364153]">Subject <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="email.subject" placeholder="Enter email subject"
                 class="w-full h-[50px] px-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] focus:outline-none focus:border-[#155dfc]">
        </div>

        <!-- Priority & HTML toggle -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[14px] font-bold text-[#364153]">Priority</label>
            <select [(ngModel)]="email.priority"
                    class="w-full h-[50px] px-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] focus:outline-none focus:border-[#155dfc] appearance-none">
              <option *ngFor="let p of priorities" [value]="p">{{p}}</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-[14px] font-bold text-[#364153]">Format</label>
            <div class="flex items-center gap-3 h-[50px]">
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" [(ngModel)]="email.isHtml" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#155dfc]"></div>
                <span class="ml-3 text-[15px] text-[#364153] font-medium">HTML Mode</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="space-y-2">
          <label class="text-[14px] font-bold text-[#364153]">Message Body <span class="text-red-500">*</span></label>
          <textarea [(ngModel)]="email.body" rows="10"
                    placeholder="Enter your message here..."
                    class="w-full p-4 bg-[#f9fafb] border border-[#e5e7eb] rounded-[12px] text-[15px] leading-relaxed focus:outline-none focus:border-[#155dfc] resize-none"></textarea>
        </div>

      </div>

    </div>
  </div>
</div>
