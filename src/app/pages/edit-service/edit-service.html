<div class="min-h-screen bg-[#f9fafb]">

  <div class="min-h-screen bg-[#f9fafb] p-[32px] pt-[96px] transition-all duration-300"
    [ngClass]="{'ml-[80px]': sidebarService.isCollapsed(), 'ml-[255px]': !sidebarService.isCollapsed()}">

    <div class="max-w-[1000px] mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">

      <!-- Breadcrumbs & Header -->
      <div class="space-y-4 mb-[32px]">
        <a routerLink="/app-inside/services"
           class="inline-flex items-center gap-[8px] text-[14px] text-[#4a5565] font-medium hover:text-[#155dfc] transition-colors cursor-pointer">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Service Plus
        </a>
        <h1 class="text-[28px] font-bold text-[#101828]">Edit Service Plus</h1>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="py-20 text-center text-[#6b7280] text-sm">Loading service...</div>

      <!-- Form -->
      <div *ngIf="!isLoading" class="bg-white rounded-[14px] border border-[#e5e7eb] shadow-sm p-[32px] space-y-[32px]">

        <!-- SECTION 1: Logo -->
        <div class="space-y-[16px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Attach Logo for Service</h3>

          <!-- Upload area — always visible -->
          <label class="border-2 border-dashed border-[#d1d5dc] rounded-[12px] p-[32px] flex flex-col items-center justify-center bg-[#f9fafb] hover:bg-[#f3f4f6] transition-colors cursor-pointer">
            <input type="file" accept=".png,.jpg,.jpeg,.svg" class="hidden" (change)="onFileSelected($event)">
            <span class="material-icons text-[#6b7280] text-[36px] mb-[10px]">cloud_upload</span>
            <p class="text-[#101828] font-medium text-[15px]">{{imagePreview ? 'Click to replace logo' : 'Click to upload or drag and drop'}}</p>
            <p class="text-[#6b7280] text-[13px] mt-[4px]">PNG, JPG or SVG (max. 2MB)</p>
          </label>

          <!-- Preview — shown below upload area when image is set -->
          <div *ngIf="imagePreview" class="flex items-center gap-[12px]">
            <div class="relative w-[80px] h-[80px] rounded-[8px] border border-[#e5e7eb] overflow-hidden bg-white flex items-center justify-center">
              <img [src]="imagePreview" alt="Logo preview" class="max-w-full max-h-full object-contain p-1">
            </div>
            <div>
              <p class="text-[13px] font-medium text-[#101828]">{{selectedFileName || 'Current logo'}}</p>
              <button type="button" (click)="removeImage()" class="text-[13px] text-red-500 hover:text-red-700 mt-[2px]">Remove</button>
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 2: Basic Details -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Basic Details</h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Department <span class="text-red-500">*</span></label>
              <select [(ngModel)]="service.deptId"
                      class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Department</option>
                <option *ngFor="let dept of departments" [value]="dept.deptId">{{dept.sname}}</option>
              </select>
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service Title <span class="text-red-500">*</span></label>
              <input type="text" [(ngModel)]="service.title" placeholder="Enter service title"
                     class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>

          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Tag Line</label>
            <input type="text" [(ngModel)]="service.tagLine" placeholder="Short tagline"
                   class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
          </div>

          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Service Description</label>
            <textarea [(ngModel)]="service.description" rows="4" placeholder="Enter details..."
                      class="w-full p-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service URL</label>
              <input type="text" [(ngModel)]="service.url" placeholder="https://"
                     class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">State ID</label>
              <input type="text" [(ngModel)]="service.stateId" placeholder="State ID"
                     class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 3: Classification -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Classification</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Category</label>
              <select [(ngModel)]="service.categoryId"
                      class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Category</option>
                <option *ngFor="let cat of categories" [value]="cat.cgid">{{cat.cgname}}</option>
              </select>
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Dept Type</label>
              <select [(ngModel)]="service.deptType"
                      class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="Central">Central</option>
                <option value="State">State</option>
              </select>
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 4: Search Keywords -->
        <div class="space-y-[16px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Search Keywords</h3>

          <!-- Chip input -->
          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Add Keywords</label>
            <div class="flex gap-2">
              <input type="text" [(ngModel)]="keywordInput" (keydown)="onKeywordKeydown($event)"
                     placeholder="Type keyword and press Enter or comma"
                     class="flex-1 h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
              <button type="button" (click)="addKeyword()"
                      class="h-[46px] px-[20px] bg-[#155dfc] text-white rounded-[8px] text-[14px] font-medium hover:bg-blue-700 transition-colors cursor-pointer">
                Add
              </button>
            </div>
          </div>

          <!-- Chips display -->
          <div *ngIf="keywords.length > 0" class="flex flex-wrap gap-2">
            <span *ngFor="let kw of keywords"
                  class="inline-flex items-center gap-1 bg-[#eff6ff] text-[#155dfc] text-[13px] font-medium px-3 py-1.5 rounded-full border border-[#bfdbfe]">
              {{kw}}
              <button type="button" (click)="removeKeyword(kw)"
                      class="text-[#155dfc] hover:text-red-500 transition-colors cursor-pointer">
                <span class="material-icons text-[14px]">close</span>
              </button>
            </span>
          </div>
          <p *ngIf="keywords.length === 0" class="text-[13px] text-[#9ca3af]">No keywords added yet.</p>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 5: Flags -->
        <div class="space-y-[16px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Service Flags</h3>
          <p class="text-[13px] text-[#6a7282]">Mark this service to highlight it in specific listings.</p>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-[16px]">

            <!-- New -->
            <label class="flex items-center gap-[14px] p-[16px] border border-[#e5e7eb] rounded-[10px] cursor-pointer hover:border-[#155dfc] hover:bg-[#f5f8ff] transition-all"
              [ngClass]="{'border-[#155dfc] bg-[#f5f8ff]': service.flagnew === 'yes'}"
              (click)="service.flagnew = service.flagnew === 'yes' ? 'no' : 'yes'">
              <div class="w-[20px] h-[20px] rounded-[4px] border-2 flex items-center justify-center flex-shrink-0 transition-colors"
                [ngClass]="service.flagnew === 'yes' ? 'bg-[#155dfc] border-[#155dfc]' : 'border-[#d1d5dc] bg-white'">
                <span *ngIf="service.flagnew === 'yes'" class="material-icons text-white text-[14px]">check</span>
              </div>
              <div>
                <p class="text-[14px] font-semibold text-[#101828]">New</p>
                <p class="text-[12px] text-[#6a7282]">Mark as newly added</p>
              </div>
            </label>

            <!-- Popular -->
            <label class="flex items-center gap-[14px] p-[16px] border border-[#e5e7eb] rounded-[10px] cursor-pointer hover:border-[#f59e0b] hover:bg-[#fffbf0] transition-all"
              [ngClass]="{'border-[#f59e0b] bg-[#fffbf0]': service.popular === 'yes'}"
              (click)="service.popular = service.popular === 'yes' ? 'no' : 'yes'">
              <div class="w-[20px] h-[20px] rounded-[4px] border-2 flex items-center justify-center flex-shrink-0 transition-colors"
                [ngClass]="service.popular === 'yes' ? 'bg-[#f59e0b] border-[#f59e0b]' : 'border-[#d1d5dc] bg-white'">
                <span *ngIf="service.popular === 'yes'" class="material-icons text-white text-[14px]">check</span>
              </div>
              <div>
                <p class="text-[14px] font-semibold text-[#101828]">Popular</p>
                <p class="text-[12px] text-[#6a7282]">Mark as popular service</p>
              </div>
            </label>

            <!-- Trending -->
            <label class="flex items-center gap-[14px] p-[16px] border border-[#e5e7eb] rounded-[10px] cursor-pointer hover:border-[#00a63e] hover:bg-[#f0fdf4] transition-all"
              [ngClass]="{'border-[#00a63e] bg-[#f0fdf4]': service.trending === 'yes'}"
              (click)="service.trending = service.trending === 'yes' ? 'no' : 'yes'">
              <div class="w-[20px] h-[20px] rounded-[4px] border-2 flex items-center justify-center flex-shrink-0 transition-colors"
                [ngClass]="service.trending === 'yes' ? 'bg-[#00a63e] border-[#00a63e]' : 'border-[#d1d5dc] bg-white'">
                <span *ngIf="service.trending === 'yes'" class="material-icons text-white text-[14px]">check</span>
              </div>
              <div>
                <p class="text-[14px] font-semibold text-[#101828]">Trending</p>
                <p class="text-[12px] text-[#6a7282]">Mark as trending service</p>
              </div>
            </label>

          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 6: Status -->
        <div class="space-y-[16px] pb-[8px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Status</h3>
          <div class="flex items-center gap-[12px]">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" [ngModel]="service.status === 'active'"
                     (ngModelChange)="service.status = $event ? 'active' : 'inactive'" class="sr-only peer">
              <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-[#155dfc] rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00c950]"></div>
              <span class="ml-[12px] text-[15px] font-medium text-[#364153]">Is Active</span>
            </label>
          </div>
        </div>

      </div>

      <!-- Footer Actions -->
      <div *ngIf="!isLoading" class="flex items-center justify-end gap-[12px] mt-[32px] mb-[40px]">
        <button routerLink="/app-inside/services"
                class="h-[44px] px-[24px] text-[14px] font-medium text-[#4a5565] bg-white border border-[#d1d5dc] rounded-[8px] hover:bg-gray-50 transition-colors cursor-pointer">
          Cancel
        </button>
        <button (click)="onSubmit()" [disabled]="isSubmitting"
                class="h-[44px] px-[32px] text-[14px] font-medium text-white bg-[#155dfc] rounded-[8px] hover:bg-blue-700 shadow-[0px_4px_6px_rgba(21,93,252,0.2)] transition-all disabled:opacity-60 cursor-pointer">
          {{isSubmitting ? 'Updating...' : 'Update Service'}}
        </button>
      </div>

    </div>
  </div>
</div>
