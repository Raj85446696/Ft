<div class="min-h-screen bg-[#f9fafb]">
  <app-navbar></app-navbar>
  <app-sidebar></app-sidebar>

  <!-- Main Content Padding -->
  <div class="min-h-screen bg-[#f9fafb] p-[32px] pt-[96px] transition-all duration-300"
    [ngClass]="{'ml-[80px]': sidebarService.isCollapsed(), 'ml-[255px]': !sidebarService.isCollapsed()}">
    
    <div class="max-w-[1000px] mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
      
      <!-- Breadcrumbs & Header -->
      <div class="space-y-4 mb-[32px]">
        <a routerLink="/app-inside/services" class="inline-flex items-center gap-[8px] text-[14px] text-[#4a5565] font-medium hover:text-[#155dfc] transition-colors cursor-pointer">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Service Plus
        </a>
        <h1 class="text-[28px] font-bold text-[#101828]">Edit Service Plus</h1>
      </div>

      <!-- Main Form Container -->
      <div class="bg-white rounded-[14px] border border-[#e5e7eb] shadow-sm p-[32px] space-y-[32px]">
        
        <!-- SECTION 1: Attach Logo -->
        <div class="space-y-[16px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Attach Logo for Service *</h3>
          <div class="border-2 border-dashed border-[#d1d5dc] rounded-[12px] p-[24px] flex flex-col items-center justify-center bg-[#f9fafb] hover:bg-[#f3f4f6] transition-colors cursor-pointer text-center relative overflow-hidden">
            <!-- Show existing file mockup -->
            <img src="/assets/vaccination_service_icon_1774859915087.png" class="h-[64px] object-contain mb-[12px] opacity-80" alt="Pre-uploaded Logo">
            <p class="text-[#155dfc] font-medium text-[14px] flex items-center gap-[4px]"><span class="material-icons text-[16px]">cloud_upload</span> Replace Logo</p>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 2: Basic Details -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Basic Details</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Department Name *</label>
              <select [(ngModel)]="service.department" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Department</option>
                <option *ngFor="let dept of departments" [value]="dept">{{dept}}</option>
              </select>
            </div>
            
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service Title *</label>
              <input type="text" [(ngModel)]="service.title" placeholder="Enter service title" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>

          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Service Description *</label>
            <textarea [(ngModel)]="service.description" rows="4" placeholder="Enter details..." class="w-full p-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service ID</label>
              <input type="text" [(ngModel)]="service.serviceId" placeholder="Enter ID" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service Owner Code</label>
              <input type="text" [(ngModel)]="service.ownerCode" placeholder="Enter Code" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 3: Classification -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Classification</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Category *</label>
              <select [(ngModel)]="service.category" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Category</option>
                <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
              </select>
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Search Keywords</label>
              <input type="text" [(ngModel)]="service.keywords" placeholder="E.g. health, clinic" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 4: Address Information -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Address Information</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Address Info 1</label>
              <input type="text" [(ngModel)]="service.address1" placeholder="Address Line 1" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Address Info 2</label>
              <input type="text" [(ngModel)]="service.address2" placeholder="Address Line 2" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 5: Configuration -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Configuration</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">FAQ</label>
              <input type="text" [(ngModel)]="service.faq" placeholder="Link to FAQ" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Tiny URL</label>
              <input type="text" [(ngModel)]="service.tinyUrl" placeholder="Optional" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px] md:col-span-2">
              <label class="block text-[14px] font-medium text-[#364153]">Secret Key</label>
              <input type="text" [(ngModel)]="service.secretKey" placeholder="Enter Secret Key" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 6: Technical Details -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Technical Details</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Service Language</label>
              <select [(ngModel)]="service.language" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option *ngFor="let lang of languages" [value]="lang">{{lang}}</option>
              </select>
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Redirect API (Optional)</label>
              <input type="text" [(ngModel)]="service.redirectApi" placeholder="E.g. https://" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
               <label class="block text-[14px] font-medium text-[#364153]">Instance ID</label>
               <input type="text" [(ngModel)]="service.instanceId" placeholder="ID" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
             </div>
             <div class="space-y-[8px]">
               <label class="block text-[14px] font-medium text-[#364153]">Dynamic Value Path</label>
               <input type="text" [(ngModel)]="service.dynamicPath" placeholder="Path" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
             </div>
             <div class="space-y-[8px]">
               <label class="block text-[14px] font-medium text-[#364153]">Version Code</label>
               <input type="text" [(ngModel)]="service.versionCode" placeholder="E.g. 1.0.0" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
             </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 7: Status -->
        <div class="space-y-[16px] pb-[8px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Status</h3>
          <div class="flex items-center gap-[12px]">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" [(ngModel)]="service.isActive" class="sr-only peer">
              <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-[#155dfc] rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00c950]"></div>
              <span class="ml-[12px] text-[15px] font-medium text-[#364153]">Is Active</span>
            </label>
          </div>
        </div>

      </div>
      
      <!-- Footer Actions -->
      <div class="flex items-center justify-end gap-[12px] mt-[32px] mb-[40px]">
        <button routerLink="/app-inside/services" class="h-[44px] px-[24px] text-[14px] font-medium text-[#4a5565] bg-white border border-[#d1d5dc] rounded-[8px] hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button (click)="onSubmit()" class="h-[44px] px-[32px] text-[14px] font-medium text-white bg-[#155dfc] rounded-[8px] hover:bg-blue-700 shadow-[0px_4px_6px_rgba(21,93,252,0.2)] transition-all">
          Update Service
        </button>
      </div>

    </div>
  </div>
</div>
