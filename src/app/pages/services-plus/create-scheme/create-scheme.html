<div class="min-h-screen bg-[#f9fafb]">
  <app-navbar></app-navbar>
  <app-sidebar></app-sidebar>

  <div class="min-h-screen bg-[#f9fafb] p-[32px] pt-[96px] transition-all duration-300"
    [ngClass]="{'ml-[80px]': sidebarService.isCollapsed(), 'ml-[255px]': !sidebarService.isCollapsed()}">
    
    <div class="max-w-[1000px] mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
      
      <!-- Breadcrumbs & Header -->
      <div class="space-y-4 mb-[32px]">
        <a routerLink="/services-plus/manage-scheme" class="inline-flex items-center gap-[8px] text-[14px] text-[#4a5565] font-medium hover:text-[#155dfc] transition-colors cursor-pointer">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Manage Schemes
        </a>
        <h1 class="text-[28px] font-bold text-[#101828]">Create New Scheme</h1>
      </div>

      <!-- Main Form Container -->
      <div class="bg-white rounded-[14px] border border-[#e5e7eb] shadow-sm p-[32px] space-y-[32px]">
        
        <!-- SECTION 1: Attach Logo -->
        <div class="space-y-[16px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Attach Image/Logo for Scheme</h3>
          <div class="border-2 border-dashed border-[#d1d5dc] rounded-[12px] p-[40px] flex flex-col items-center justify-center bg-[#f9fafb] hover:bg-[#f3f4f6] transition-colors cursor-pointer">
            <span class="material-icons text-[#6b7280] text-[40px] mb-[12px]">cloud_upload</span>
            <p class="text-[#101828] font-medium text-[15px]">Click to upload or drag and drop</p>
            <p class="text-[#6b7280] text-[13px] mt-[4px]">PNG, JPG or SVG (max. 2MB)</p>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 2: Basic Details -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Basic Details</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Department Name *</label>
              <select [(ngModel)]="scheme.department" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Department</option>
                <option *ngFor="let dept of departments" [value]="dept">{{dept}}</option>
              </select>
            </div>
            
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Scheme Name *</label>
              <input type="text" [(ngModel)]="scheme.name" placeholder="Enter scheme title" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>

          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Functional Scope Overview *</label>
            <textarea [(ngModel)]="scheme.description" rows="4" placeholder="Summary of what the scheme achieves..." class="w-full p-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Scheme Code</label>
              <input type="text" [(ngModel)]="scheme.code" placeholder="e.g. SJE-GOI-2024" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Launch Year</label>
              <input type="text" [(ngModel)]="scheme.launchYear" placeholder="e.g. 2024" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 3: Classification -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Classification & Demographics</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Category *</label>
              <select [(ngModel)]="scheme.category" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="" disabled>Select Category</option>
                <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
              </select>
            </div>
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Beneficiary Type</label>
              <select [(ngModel)]="scheme.beneficiaryType" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option *ngFor="let type of beneficiaryTypes" [value]="type">{{type}}</option>
              </select>
            </div>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 4: Operational Guidelines -->
        <div class="space-y-[24px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Operational Guidelines</h3>
          <div class="space-y-[8px]">
            <label class="block text-[14px] font-medium text-[#364153]">Eligibility Criteria and Details</label>
            <textarea [(ngModel)]="scheme.guidelines" rows="6" placeholder="Documented criteria for applicant eligibility and documentation requirements..." class="w-full p-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]"></textarea>
          </div>
        </div>

        <hr class="border-[#e5e7eb]">

        <!-- SECTION 5: Status -->
        <div class="space-y-[24px] pb-[8px]">
          <h3 class="text-[18px] font-semibold text-[#101828]">Status Config</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-[24px]">
            <div class="space-y-[8px]">
              <label class="block text-[14px] font-medium text-[#364153]">Scheme Status</label>
              <select [(ngModel)]="scheme.status" class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
                <option value="Draft">Draft</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>

      </div>
      
      <!-- Footer Actions -->
      <div class="flex items-center justify-end gap-[12px] mt-[32px] mb-[40px]">
        <button routerLink="/services-plus/manage-scheme" class="h-[44px] px-[24px] text-[14px] font-medium text-[#4a5565] bg-white border border-[#d1d5dc] rounded-[8px] hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button (click)="onSubmit()" class="h-[44px] px-[32px] text-[14px] font-medium text-white bg-[#155dfc] rounded-[8px] hover:bg-blue-700 shadow-[0px_4px_6px_rgba(21,93,252,0.2)] transition-all">
          Save
        </button>
      </div>

    </div>
  </div>
</div>
