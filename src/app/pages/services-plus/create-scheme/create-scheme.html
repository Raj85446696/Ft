<div class="min-h-screen bg-[#f9fafb]">

  <div class="min-h-screen bg-[#f9fafb] p-[32px] pt-[96px] transition-all duration-300"
    [ngClass]="{'ml-[80px]': sidebarService.isCollapsed(), 'ml-[255px]': !sidebarService.isCollapsed()}">

    <div class="max-w-[700px] mx-auto">

      <!-- Breadcrumbs & Header -->
      <div class="space-y-4 mb-[32px]">
        <a routerLink="/services-plus/manage-scheme"
           class="inline-flex items-center gap-[8px] text-[14px] text-[#4a5565] font-medium hover:text-[#155dfc] transition-colors cursor-pointer">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Manage Schemes
        </a>
        <h1 class="text-[28px] font-bold text-[#101828]">{{isEditMode ? 'Edit Scheme' : 'Create New Scheme'}}</h1>
      </div>

      <!-- Form -->
      <div class="bg-white rounded-[14px] border border-[#e5e7eb] shadow-sm p-[32px] space-y-[28px]">

        <!-- Scheme Name -->
        <div class="space-y-[8px]">
          <label class="block text-[14px] font-medium text-[#364153]">Scheme Name <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="scheme.name" placeholder="Enter scheme name"
                 class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
        </div>

        <!-- Scheme Type -->
        <div class="space-y-[8px]">
          <label class="block text-[14px] font-medium text-[#364153]">Scheme Type <span class="text-red-500">*</span></label>
          <div *ngIf="isLoadingTypes" class="text-[13px] text-[#6b7280] py-2">Loading types...</div>
          <select *ngIf="!isLoadingTypes" [(ngModel)]="scheme.typeId"
                  class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc] appearance-none">
            <option value="" disabled>Select Scheme Type</option>
            <option *ngFor="let type of schemeTypes" [value]="type.typeId">{{type.typeName}}</option>
          </select>
        </div>

        <!-- Scheme ID (optional, for updates) -->
        <div class="space-y-[8px]">
          <label class="block text-[14px] font-medium text-[#364153]">Scheme ID
            <span class="text-[12px] text-[#9ca3af] font-normal ml-1">(leave blank to auto-generate)</span>
          </label>
          <input type="text" [(ngModel)]="scheme.schemeId" placeholder="Auto-generated if left blank"
                 class="w-full h-[46px] px-[16px] bg-[#f9fafb] border border-[#e5e7eb] rounded-[8px] text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] focus:ring-1 focus:ring-[#155dfc]">
        </div>

      </div>

      <!-- Footer Actions -->
      <div class="flex items-center justify-end gap-[12px] mt-[32px] mb-[40px]">
        <button routerLink="/services-plus/manage-scheme"
                class="h-[44px] px-[24px] text-[14px] font-medium text-[#4a5565] bg-white border border-[#d1d5dc] rounded-[8px] hover:bg-gray-50 transition-colors cursor-pointer">
          Cancel
        </button>
        <button (click)="onSubmit()" [disabled]="isSubmitting"
                class="h-[44px] px-[32px] text-[14px] font-medium text-white bg-[#155dfc] rounded-[8px] hover:bg-blue-700 shadow-[0px_4px_6px_rgba(21,93,252,0.2)] transition-all disabled:opacity-60 cursor-pointer">
          {{isSubmitting ? 'Saving...' : (isEditMode ? 'Update Scheme' : 'Create Scheme')}}
        </button>
      </div>

    </div>
  </div>
</div>
