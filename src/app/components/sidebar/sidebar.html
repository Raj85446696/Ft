<aside
  class="fixed left-0 top-16 h-[calc(100vh-4rem)] bg-white border-r border-gray-200 transition-all duration-300 shadow-sm z-40 overflow-y-auto"
  [ngClass]="sidebarService.isCollapsed() ? 'w-16' : 'w-[255px]'"
  style="scrollbar-width: none; -ms-overflow-style: none;">
  
  <div class="h-full">
    <!-- Desktop Toggle Button -->
    <div class="p-3 border-b border-gray-200">
      <button
        (click)="sidebarService.toggle()"
        class="w-full flex items-center justify-center p-2.5 bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition-all shadow-md hover:shadow-lg group"
        [title]="sidebarService.isCollapsed() ? 'Expand Sidebar' : 'Collapse Sidebar'">
        
        <span *ngIf="sidebarService.isCollapsed()" class="material-icons group-hover:scale-110 transition-transform">chevron_right</span>
        
        <div *ngIf="!sidebarService.isCollapsed()" class="flex items-center space-x-2">
          <span class="material-icons group-hover:-translate-x-0.5 transition-transform">chevron_left</span>
          <span class="text-sm font-medium">Collapse</span>
        </div>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="px-2 py-4">
      <div *ngFor="let item of menuItems" class="mb-1">
        
        <!-- Standard Link Item -->
        <a *ngIf="item.path"
           [routerLink]="item.path"
           routerLinkActive="bg-blue-50 text-blue-600 shadow-sm"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg transition-all text-gray-700 hover:bg-gray-100 cursor-pointer">
          <span class="material-icons w-5 h-5 flex-shrink-0 flex items-center justify-center">{{item.icon}}</span>
          <span *ngIf="!sidebarService.isCollapsed()" class="text-sm font-medium whitespace-nowrap">{{item.title}}</span>
        </a>

        <!-- Section with Sub-items -->
        <div *ngIf="!item.path">
          <button
            (click)="item.section && toggleSection(item.section)"
            class="w-full flex items-center justify-between px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-all cursor-pointer">
            <div class="flex items-center space-x-3">
              <span class="material-icons w-5 h-5 flex-shrink-0 flex items-center justify-center">{{item.icon}}</span>
              <span *ngIf="!sidebarService.isCollapsed()" class="text-sm font-medium whitespace-nowrap">{{item.title}}</span>
            </div>
            <span *ngIf="!sidebarService.isCollapsed() && item.section" 
                  class="material-icons text-[18px] transition-transform"
                  [class.rotate-180]="isSectionExpanded(item.section)">
              expand_more
            </span>
          </button>

          <!-- Sub-items (Accordion Content) -->
          <div *ngIf="!sidebarService.isCollapsed() && item.section && isSectionExpanded(item.section)" 
               class="ml-4 mt-1 space-y-1 border-l-2 border-gray-200 pl-2 animate-in fade-in duration-300">
            <a *ngFor="let sub of item.subItems"
               [routerLink]="sub.path"
               routerLinkActive="bg-blue-50 text-blue-600 font-medium"
               class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900 cursor-pointer">
              <span class="material-icons text-[18px]">{{sub.icon}}</span>
              <span class="whitespace-nowrap">{{sub.title}}</span>
            </a>
          </div>
        </div>

      </div>
    </nav>
  </div>
</aside>
